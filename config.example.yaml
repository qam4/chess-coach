# Chess Coach configuration
# Copy this file to config.yaml and adjust paths for your system.

engine:
  # Path to the chess engine binary.
  # Use a plain string for a single platform, or a mapping for per-platform paths:
  #   path: "/usr/local/bin/stockfish"          # single platform
  #   path:                                      # multi-platform
  #     linux: "/usr/local/bin/stockfish"
  #     windows: "C:/tools/stockfish.exe"
  #     darwin: "/opt/homebrew/bin/stockfish"
  path: "/usr/local/bin/stockfish"
  # Protocol: "xboard" or "uci" (uci coming soon)
  protocol: "xboard"
  # Extra arguments passed to the engine
  args: []
  # Analysis depth (plies)
  depth: 18
  # Analysis time limit in seconds (overrides depth if set)
  # time_limit: 5.0

llm:
  # Provider: "ollama" or "openai_compat"
  provider: "ollama"
  # Model name (as known by the provider)
  model: "qwen3:8b"
  # Base URL for the LLM API
  base_url: "http://localhost:11434"
  # Max tokens for the coaching response
  max_tokens: 512
  # Temperature (lower = more focused, higher = more creative)
  temperature: 0.7
  # Timeout in seconds for LLM requests (increase for slow models)
  timeout: 300

coaching:
  # Number of top moves to analyze and explain
  top_moves: 3
  # Coaching style: "beginner", "intermediate", "advanced"
  level: "intermediate"
