# Move-feedback benchmark: (position, student move) scenarios for evaluating
# reactive coaching feedback (the step-1 coaching moment), NOT position
# analysis. Ground truth (sound / inaccuracy / blunder, the better move, the
# missed idea) is derived from the engine at eval time -- do NOT hand-annotate
# verdicts here (see eval/move_feedback.py). Each `move` must be legal in `fen`.
#
# A deliberate mix of sound and dubious moves so the feedback path is exercised
# across "well played" and "here's what you missed" cases.

version: 1
scenarios:
  - id: opening_e4_sound
    fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
    move: e2e4
    level: beginner
    note: "principled central opening move"

  - id: weakening_f6
    fen: "rnbqkbnr/pppppppp/8/8/4P3/8/PPPP1PPP/RNBQKBNR b KQkq e3 0 1"
    move: f7f6
    level: beginner
    note: "weakens the king's diagonal; should be teachable"

  - id: develop_nf3_sound
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2"
    move: g1f3
    level: beginner
    note: "natural development, attacks e5"

  - id: premature_queen_qh5
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2"
    move: d1h5
    level: intermediate
    note: "early queen sortie; principle of not bringing the queen out too soon"

  - id: weakening_g5
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: g7g5
    level: beginner
    note: "loosening kingside pawn move"

  - id: develop_nc6_sound
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: b8c6
    level: beginner
    note: "natural development, defends e5"
  - id: blunder_king_move_ke7
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: e8e7
    level: beginner
    note: "moving the king loses castling and exposes it"

  - id: blunder_queen_sortie_qg5
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: d8g5
    level: beginner
    note: "early queen sortie that hangs to Nxg5"

  - id: dubious_rook_pawn_a5
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: a7a5
    level: beginner
    note: "purposeless rook-pawn move, ignores development"

  - id: dubious_queen_blocks_qe7
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: d8e7
    level: intermediate
    note: "blocks the f8 bishop's development"

  - id: sound_petrov_nf6
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: g8f6
    level: beginner
    note: "sound: counterattacks e4 (Petrov Defense)"

  - id: sound_philidor_d6
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R b KQkq - 1 2"
    move: d7d6
    level: beginner
    note: "solid defensive setup (Philidor)"

  - id: blunder_kingside_g5
    fen: "r1bqkbnr/pppp1ppp/2n5/4p3/2B1P3/5N2/PPPP1PPP/RNBQK2R b KQkq - 3 3"
    move: g7g5
    level: beginner
    note: "wrecks the kingside pawn shield"

  - id: blunder_hang_pawn_b5
    fen: "r1bqkbnr/pppp1ppp/2n5/4p3/2B1P3/5N2/PPPP1PPP/RNBQK2R b KQkq - 3 3"
    move: b7b5
    level: beginner
    note: "hangs the b5 pawn to Bxb5"

  - id: dubious_premature_nd4
    fen: "r1bqkbnr/pppp1ppp/2n5/4p3/2B1P3/5N2/PPPP1PPP/RNBQK2R b KQkq - 3 3"
    move: c6d4
    level: intermediate
    note: "premature knight leap; allows Nxe5 ideas"

  - id: sound_italian_bc5
    fen: "r1bqkbnr/pppp1ppp/2n5/4p3/2B1P3/5N2/PPPP1PPP/RNBQK2R b KQkq - 3 3"
    move: f8c5
    level: beginner
    note: "sound development (Giuoco Piano)"

  - id: blunder_bongcloud_ke2
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2"
    move: e1e2
    level: beginner
    note: "exposes the king and blocks development"

  - id: dubious_early_queen_qg4
    fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2"
    move: d1g4
    level: intermediate
    note: "premature queen move out of the opening"

  - id: dubious_rook_pawn_a4
    fen: "r1bqk1nr/pppp1ppp/2n5/2b1p3/2B1P3/5N2/PPPP1PPP/RNBQK2R w KQkq - 4 4"
    move: a2a4
    level: beginner
    note: "purposeless edge-pawn move, ignores the center"

  - id: sound_castle_oo
    fen: "r1bqk1nr/pppp1ppp/2n5/2b1p3/2B1P3/5N2/PPPP1PPP/RNBQK2R w KQkq - 4 4"
    move: e1g1
    level: beginner
    note: "sound: castle the king to safety"
