<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Coach</title>
  <link rel="stylesheet" href="/static/vendor/chessboard.css">
  <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
  <header>
    <h1>♟ Chess Coach</h1>
    <div class="mode-toggle" role="tablist" aria-label="Mode">
      <button class="mode-btn active" data-mode="analyze" role="tab" aria-selected="true">Analyze</button>
      <button class="mode-btn" data-mode="play" role="tab" aria-selected="false">Play</button>
    </div>
  </header>

  <main class="app-layout">
    <!-- Left: Board + eval bar -->
    <section class="board-section">
      <div class="board-wrapper">
        <div class="eval-bar" id="evalBar">
          <div class="eval-fill" id="evalFill"></div>
        </div>
        <div id="board" class="chess-board"></div>
      </div>

      <!-- Shared controls -->
      <div class="controls" style="padding: 4px 0;">
        <label for="templateToggle" style="font-size: 0.85em; cursor: pointer;">
          <input type="checkbox" id="templateToggle"> Template mode (no LLM — instant)
        </label>
      </div>

      <!-- Analyze mode controls -->
      <div class="controls analyze-only" id="analyzeControls">
        <div class="fen-row">
          <label for="fenInput">FEN</label>
          <input type="text" id="fenInput"
                 value="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
                 placeholder="Paste FEN here…">
        </div>
        <div class="options-row">
          <div class="option-group">
            <label for="depthSlider">Depth: <span id="depthValue">8</span></label>
            <input type="range" id="depthSlider" min="1" max="30" value="8">
          </div>
          <div class="option-group">
            <label for="levelSelect">Level</label>
            <select id="levelSelect">
              <option value="beginner">Beginner</option>
              <option value="intermediate" selected>Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
          <button id="analyzeBtn" class="btn-primary">Analyze</button>
        </div>
      </div>

      <!-- Play mode controls -->
      <div class="controls play-only" id="playControls" hidden>
        <div class="play-buttons">
          <button id="newGameBtn" class="btn-primary">New Game</button>
          <button id="undoBtn" class="btn-secondary">Undo</button>
        </div>
        <div class="strength-control">
          <label for="strengthSlider">Engine: <span id="strengthLabel">Full strength</span></label>
          <input type="range" id="strengthSlider" min="0" max="2500" step="100" value="0">
        </div>
      </div>
    </section>

    <!-- Middle: Move list (play mode only) -->
    <section class="move-list-panel play-only" id="moveListPanel" hidden>
      <h2>Moves</h2>
      <div class="move-list" id="moveList"></div>
      <div class="game-result" id="gameResult" hidden></div>
    </section>

    <!-- Right: Coaching panel -->
    <section class="coaching-panel" id="coachingPanel">
      <h2>Coaching</h2>
      <div class="coaching-meta" id="coachingMeta"></div>
      <div class="user-feedback" id="userFeedback" hidden></div>
      <div class="coaching-text" id="coachingText">
        <p class="placeholder">Set up a position and click <strong>Analyze</strong> to get coaching.</p>
      </div>
      <div class="hint-container" id="hintContainer" hidden>
        <button class="hint-btn" id="hintBtn">💡 Show hint</button>
        <div class="hint-text" id="hintText" hidden></div>
      </div>
      <div class="spinner" id="spinner" hidden>
        <div class="spinner-circle"></div>
        <span id="spinnerText">Thinking…</span>
      </div>
    </section>
  </main>

  <!-- Color picker modal -->
  <div class="modal-overlay" id="colorModal" hidden>
    <div class="modal">
      <h3>Choose your color</h3>
      <div class="color-buttons">
        <button class="color-btn" data-color="white">♔ Play as White</button>
        <button class="color-btn" data-color="black">♚ Play as Black</button>
      </div>
    </div>
  </div>

  <!-- SVG layer for arrows (overlaid on board) -->
  <svg id="arrowSvg" class="arrow-overlay"></svg>

  <!-- Debug panel -->
  <details class="debug-panel" id="debugPanel">
    <summary>Debug</summary>
    <pre id="debugContent" class="debug-content">No data yet. Make a move or analyze a position.</pre>
  </details>

  <script src="/static/vendor/jquery.min.js"></script>
  <script src="/static/vendor/chess.js"></script>
  <script src="/static/vendor/chessboard.js"></script>
  <script src="/static/app.js?v=6"></script>
</body>
</html>
