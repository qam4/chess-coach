# Chess Coach configuration

engine:
  # Path to the chess engine binary (per-platform overrides)
  path:
    linux: "~/src/fred/blunder/build/rel/blunder"
    windows: "C:/src/blunder/build/dev/blunder.exe"
  # Protocol: "uci" (recommended) or "xboard"
  protocol: "uci"
  # Extra arguments passed to the engine (--uci/--xboard added automatically)
  args: []
  # Opening book file for play mode variety (polyglot .bin format)
  # Blunder ships with: i-gm1950.bin, k-stfish.bin, n-larsen.bin
  book: "~/src/fred/blunder/books/i-gm1950.bin"
  # Analysis depth (plies)
  depth: 8
  # Play strength: Elo rating for engine's play moves (500-2500)
  # Analysis always uses full strength regardless of this setting.
  # Set to 0 or omit to play at full strength.
  play_elo: 1500
  # Play strength (1-20, only affects engine moves in play mode, not analysis)
  play_skill: 10
  # Analysis time limit in seconds (overrides depth if set)
  # time_limit: 5.0

llm:
  # Provider: "ollama" or "openai_compat"
  provider: "ollama"
  # Model name (as known by the provider)
  model: "llama3.2:3b"
  # Base URL for the LLM API
  base_url: "http://localhost:11434"
  # Max tokens for the coaching response
  max_tokens: 512
  # Temperature (lower = more focused, higher = more creative)
  temperature: 0.7
  # Timeout in seconds for LLM requests (increase for slow models)
  timeout: 300

coaching:
  # Number of top moves to analyze and explain
  top_moves: 3
  # Coaching style: "beginner", "intermediate", "advanced"
  level: "intermediate"
