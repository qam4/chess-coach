[tox]
envlist = py3, lint, typecheck
isolated_build = true

[testenv]
deps =
    -r requirements-dev.txt
commands =
    pytest {posargs:tests/}

[testenv:lint]
deps =
    -r requirements-dev.txt
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:typecheck]
deps =
    -r requirements-dev.txt
commands =
    mypy src/chess_coach/

[testenv:format]
deps =
    -r requirements-dev.txt
commands =
    ruff format src/ tests/
    ruff check --fix src/ tests/
